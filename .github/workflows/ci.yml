name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Toolchain (zig + cmake + ninja + go) comes from mise.toml. Pinning
# `zig = "master"` accepts toolchain churn — we re-resolve master on
# every CI run — in exchange for working `zig build test --fuzz` and
# the latest language fixes downstream consumers (e.g. quic-zig) need.
jobs:
  native:
    name: native test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Show toolchain
        run: zig version

      - name: zig build test
        run: zig build test --summary all

      - name: zig build run-smoke
        run: zig build run-smoke

      - name: Consumer integration test
        working-directory: examples/consumer
        run: zig build test --summary all

  cross:
    name: cross ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-macos
          - x86_64-macos
          - aarch64-linux-musl
          - x86_64-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Cross-link smoke executable
        run: zig build -Dtarget=${{ matrix.target }}
